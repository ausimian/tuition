name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Formatting is a single-source concern, so check it once against one
  # canonical toolchain rather than per matrix cell.
  lint:
    name: lint (format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          rebar3-version: "3"

      - name: Check formatting (erlfmt)
        run: rebar3 fmt --check

  # Pure-Erlang, zero-dependency library: build/test on rebar3 across the
  # supported OTP cells. Sonde/tuition require OTP 28+ (raw terminal mode).
  build:
    name: build (OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        otp: ["28", "29"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: "3"

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: rebar3-v1-${{ runner.os }}-otp${{ matrix.otp }}-${{ hashFiles('rebar.config', 'rebar.lock') }}
          restore-keys: |
            rebar3-v1-${{ runner.os }}-otp${{ matrix.otp }}-

      - name: Compile (warnings as errors)
        run: rebar3 compile

      - name: EUnit
        run: rebar3 eunit

      - name: Xref
        run: rebar3 xref

      - name: Dialyzer
        run: rebar3 dialyzer
